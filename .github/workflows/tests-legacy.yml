name: Tests (legacy)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Legacy pipeline: runs the test suite against the OLDER supported game versions, opt-in via
# -p:Legacy=true against each version's target framework. Kept separate from the primary Tests
# workflow so the current-version build and the legacy builds report as independent checks.
#
# Each matrix entry provisions the matching freely-downloadable dedicated-server archive into
# .game/<slug> - the in-repo location the build reads for $(GamePath) and the headless test harness
# resolves assemblies from at runtime. No coverage gate here - the gate floors track the current
# build (see tests.yml).
#
# Adding a game version means a row HERE and in the src/Directory.Build.props manifest (CI YAML
# can't read MSBuild) - the only place the version list is duplicated.

jobs:
  test:
    runs-on: ubuntu-latest
    name: ${{ matrix.game }} (${{ matrix.tfm }})
    strategy:
      fail-fast: false
      # The .0 of each legacy series - the floor the mods stay source-compatible with. Keep in sync
      # with the manifest in src/Directory.Build.props.
      matrix:
        include:
          - game: "1.21.0"
            tfm: net8.0
          - game: "1.20.0"
            tfm: net7.0

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # The legacy test host runs on the matching runtime, so install all SDKs the suite targets.
      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            7.0.x
            8.0.x
            10.0.x

      - name: Cache Vintage Story install
        id: cache-vs
        uses: actions/cache@v4
        with:
          path: .game
          key: vs-game-${{ matrix.game }}

      - name: Provision Vintage Story (server assemblies)
        run: bash scripts/provision-game.sh -Version "${{ matrix.game }}" -Kind server

      - name: Test (legacy ${{ matrix.tfm }})
        env:
          TFM: ${{ matrix.tfm }}
        run: |
          for proj in ExpandedLib.Tests PipesAndPowerExpanded.Tests \
                      SteelmakingExpanded.Tests Integration.Tests; do
            echo "::group::$proj ($TFM)"
            dotnet test "test/$proj/$proj.csproj" -p:Legacy=true -f "$TFM" -c Debug
            echo "::endgroup::"
          done
